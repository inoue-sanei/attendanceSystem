<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - 勤怠管理</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-page">
  <header>
    <h1>勤怠管理</h1>
  </header>

  <main class="login-main">
    <div class="login-card">
      <h2 class="login-card-title">ログイン</h2>

      <div id="msg" class="login-msg hidden"></div>

      <form id="login-form" class="login-form" novalidate>
        <div class="form-group">
          <label for="login-email">メールアドレス</label>
          <input type="email" id="login-email" placeholder="example@email.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="login-password">パスワード</label>
          <input type="password" id="login-password" placeholder="パスワードを入力" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-submit">ログイン</button>
      </form>
    </div>
  </main>

  <script>
    'use strict';

    const msgBox = document.getElementById('msg');

    if (localStorage.getItem('authToken')) {
      location.href = '/daily';
    }

    function showMsg(text) {
      msgBox.textContent = text;
      msgBox.className = 'login-msg login-msg--error';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        showMsg('メールアドレスとパスワードを入力してください。');
        return;
      }

      const btn = document.getElementById('login-submit');
      btn.disabled = true;
      btn.textContent = 'ログイン中...';
      msgBox.className = 'login-msg hidden';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          showMsg(data.detail || 'ログインに失敗しました。');
          return;
        }
        localStorage.setItem('authToken', data.access_token);
        localStorage.setItem('username', data.user.username);
        location.href = '/daily';
      } catch {
        showMsg('通信エラーが発生しました。');
      } finally {
        btn.disabled = false;
        btn.textContent = 'ログイン';
      }
    });
  </script>
</body>
</html>
