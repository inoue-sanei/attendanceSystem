<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ - 勤怠管理</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header>
    <h1>勤怠管理</h1>
    <div class="header-user">
      <span id="header-username" class="header-username"></span>
      <button id="logout-btn" class="btn-logout" type="button">ログアウト</button>
    </div>
  </header>

  <main class="mypage-main">

    <!-- プロフィールカード -->
    <div class="mypage-profile-card">
      <div class="mypage-avatar" id="mp-avatar">?</div>
      <div class="mypage-profile-info">
        <div class="mypage-username" id="mp-username">読み込み中...</div>
        <div class="mypage-email" id="mp-email"></div>
      </div>
    </div>

    <!-- 月次統計 -->
    <div class="mypage-stats-header">
      <button id="stats-prev" class="stats-nav-btn">&#8249;</button>
      <span class="mypage-stats-month" id="stats-month"></span>
      <button id="stats-next" class="stats-nav-btn">&#8250;</button>
    </div>
    <div class="mypage-stats-grid">
      <div class="mypage-stat-card">
        <div class="mypage-stat-value" id="stat-attendance">-</div>
        <div class="mypage-stat-label">出勤日数</div>
      </div>
      <div class="mypage-stat-card">
        <div class="mypage-stat-value mypage-stat-value--absence" id="stat-absence">-</div>
        <div class="mypage-stat-label">欠勤日数</div>
      </div>
      <div class="mypage-stat-card mypage-stat-card--leave">
        <div class="mypage-stat-value mypage-stat-value--leave" id="stat-leave">-</div>
        <div class="mypage-stat-label">残有休数</div>
        <div class="mypage-stat-sub" id="stat-leave-sub"></div>
      </div>
    </div>

    <!-- メニュー -->
    <div class="mypage-menu">
      <a href="/settings" class="mypage-menu-item">
        <span class="mypage-menu-icon">&#9881;</span>
        <span class="mypage-menu-label">デフォルト情報設定</span>
        <span class="mypage-menu-arrow">&#8250;</span>
      </a>
      <a href="/password" class="mypage-menu-item">
        <span class="mypage-menu-icon">&#128274;</span>
        <span class="mypage-menu-label">パスワード変更</span>
        <span class="mypage-menu-arrow">&#8250;</span>
      </a>
      <a href="/board" class="mypage-menu-item">
        <span class="mypage-menu-icon">&#128172;</span>
        <span class="mypage-menu-label">掲示板</span>
        <span class="mypage-menu-arrow">&#8250;</span>
      </a>
    </div>

  </main>

  <nav class="bottom-nav">
    <a href="/daily" class="bottom-nav-item">日次登録</a>
    <a href="/" class="bottom-nav-item">カレンダー</a>
    <a href="/mypage" class="bottom-nav-item bottom-nav-item--active">マイページ</a>
  </nav>

  <script src="/static/js/mypage.js"></script>
</body>
</html>
