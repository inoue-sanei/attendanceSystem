<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>掲示板 - 勤怠管理</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header>
    <h1>勤怠管理</h1>
    <div class="header-user">
      <span id="header-username" class="header-username"></span>
      <button id="logout-btn" class="btn-logout" type="button">ログアウト</button>
    </div>
  </header>

  <main class="board-main">
    <div class="board-list-header">
      <div>
        <a href="/mypage" class="back-link">&#8592; マイページ</a>
        <h2 class="page-title" style="margin-top:8px">掲示板</h2>
      </div>
      <button id="btn-new-thread" class="btn btn-primary">新規スレッド</button>
    </div>

    <!-- 新規スレッド作成フォーム -->
    <div id="new-thread-form" class="board-compose hidden">
      <div class="form-group">
        <label for="new-title">タイトル <span class="required">*</span></label>
        <input type="text" id="new-title" placeholder="スレッドのタイトルを入力" maxlength="200">
      </div>
      <div class="form-group">
        <label for="new-content">本文 <span class="required">*</span></label>
        <textarea id="new-content" placeholder="共有したい内容を入力してください..." rows="4"></textarea>
      </div>
      <div id="new-thread-error" class="board-error hidden"></div>
      <div class="board-compose-actions">
        <button type="button" id="btn-cancel-thread" class="btn btn-secondary">キャンセル</button>
        <button type="button" id="btn-post-thread" class="btn btn-primary">投稿する</button>
      </div>
    </div>

    <!-- スレッド一覧 -->
    <div id="thread-list">
      <p class="board-loading">読み込み中...</p>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="/daily" class="bottom-nav-item">日次登録</a>
    <a href="/" class="bottom-nav-item">カレンダー</a>
    <a href="/mypage" class="bottom-nav-item bottom-nav-item--active">マイページ</a>
  </nav>

  <script src="/static/js/board.js"></script>
</body>
</html>
