<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワード変更 - 勤怠管理</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header>
    <h1>勤怠管理</h1>
    <div class="header-user">
      <span id="header-username" class="header-username"></span>
      <button id="logout-btn" class="btn-logout" type="button">ログアウト</button>
    </div>
  </header>

  <main class="settings-main">
    <a href="/mypage" class="back-link">&#8592; マイページに戻る</a>
    <h2 class="page-title">パスワード変更</h2>

    <div id="pw-msg" class="settings-msg hidden"></div>

    <section class="settings-section">
      <form id="pw-form" novalidate>
        <div class="form-group">
          <label for="current-pw">現在のパスワード</label>
          <input type="password" id="current-pw" placeholder="現在のパスワードを入力" required>
        </div>
        <div class="form-group">
          <label for="new-pw">新しいパスワード <span class="required">*</span></label>
          <input type="password" id="new-pw" placeholder="8文字以上" required minlength="8">
        </div>
        <div class="form-group">
          <label for="confirm-pw">新しいパスワード（確認）</label>
          <input type="password" id="confirm-pw" placeholder="もう一度入力" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="pw-submit">変更する</button>
      </form>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="/daily" class="bottom-nav-item">日次登録</a>
    <a href="/" class="bottom-nav-item">カレンダー</a>
    <a href="/mypage" class="bottom-nav-item bottom-nav-item--active">マイページ</a>
  </nav>

  <script src="/static/js/password.js"></script>
</body>
</html>
