<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スレッド - 掲示板</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header>
    <h1>勤怠管理</h1>
    <div class="header-user">
      <span id="header-username" class="header-username"></span>
      <button id="logout-btn" class="btn-logout" type="button">ログアウト</button>
    </div>
  </header>

  <main class="board-thread-main">

    <div class="board-thread-topbar">
      <a href="/board" class="back-link">&#8592; 掲示板</a>
      <button id="btn-delete-thread" class="btn-delete-thread hidden">削除</button>
    </div>

    <!-- スレッドタイトル -->
    <div id="thread-title-area" class="board-thread-title-area">
      <h2 id="thread-title" class="board-thread-page-title"></h2>
    </div>

    <!-- メッセージストリーム（OP + コメント） -->
    <div id="message-stream" class="board-message-stream">
      <p class="board-loading">読み込み中...</p>
    </div>

    <!-- コメント入力エリア -->
    <div class="board-input-area">
      <div class="board-input-inner">
        <textarea id="new-comment" class="board-input-textarea" placeholder="返信を入力..." rows="2"></textarea>
        <div class="board-input-footer">
          <div id="comment-error" class="board-error hidden"></div>
          <button type="button" id="btn-post-comment" class="btn btn-primary btn-send">送信</button>
        </div>
      </div>
    </div>

  </main>

  <nav class="bottom-nav">
    <a href="/daily" class="bottom-nav-item">日次登録</a>
    <a href="/" class="bottom-nav-item">カレンダー</a>
    <a href="/mypage" class="bottom-nav-item bottom-nav-item--active">マイページ</a>
  </nav>

  <script src="/static/js/board_thread.js"></script>
</body>
</html>
